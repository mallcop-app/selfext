# Publish the self-extension CODE-lane runner image, under mallcop-app.
#
# Every input the Dockerfile pulls is a PUBLIC, sha256-verified download
# (mallcop-ops from this repo's release, mallcop from the OSS release, opencode
# from npm), so the image builds and pushes with this repo's own GITHUB_TOKEN —
# no cross-org credential. Prints the pushed @sha256 digest to pin in
# selfext-code-reusable.yml.
name: publish selfext runner image

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/publish-runner.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-selfext-runner
  cancel-in-progress: false

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Log in to GHCR
        uses: docker/login-action@9780b0c442fbb1117ed29e0efdff1e18412f7567 # v3.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@988b5a0280414f521da01fcc63a27aeeb4b104db # v3.6.1
      - name: Build and push
        id: build
        uses: docker/build-push-action@5cd11c3a4ced054e52742c5fd54dca954e0edd85 # v6.7.0
        with:
          context: .
          file: infra/Dockerfile
          push: true
          tags: |
            ghcr.io/mallcop-app/selfext-runner:v1
            ghcr.io/mallcop-app/selfext-runner:sha-${{ github.sha }}
      - name: Report the digest to pin
        run: |
          {
            echo "### selfext-runner published"
            echo ""
            echo "Pin this in \`selfext-code-reusable.yml\`:"
            echo '```'
            echo "image: ghcr.io/mallcop-app/selfext-runner@${{ steps.build.outputs.digest }}"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
